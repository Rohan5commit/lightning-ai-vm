name: Apply NemoClaw Runtime

on:
  workflow_dispatch:

concurrency:
  group: apply-nemoclaw-runtime
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Lightning API client
        run: |
          python -m pip install --upgrade pip
          pip install lightning-app PyYAML

      - name: Wake or heal target studio
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_PROJECT_ID: ${{ vars.TARGET_LIGHTNING_PROJECT_ID }}
          LIGHTNING_STUDIO_ID: ${{ vars.TARGET_LIGHTNING_STUDIO_ID }}
          LIGHTNING_STUDIO_NAME: ${{ vars.TARGET_LIGHTNING_STUDIO_NAME }}
          LIGHTNING_VM_TARGET: ${{ vars.TARGET_LIGHTNING_VM_TARGET }}
        run: |
          python scripts/lightning_vm_heal.py --restart-if-needed --timeout-seconds 600 --out target-runtime-status.json
          python - <<'PY'
          import json
          data = json.load(open("target-runtime-status.json"))
          print(f"target_studio_id={data['studio_id']} action={data['action']} phase={data['instance_phase']}")
          PY

      - name: Refresh target keepalive service
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_PROJECT_ID: ${{ vars.TARGET_LIGHTNING_PROJECT_ID }}
          LIGHTNING_STUDIO_ID: ${{ vars.TARGET_LIGHTNING_STUDIO_ID }}
          LIGHTNING_VM_TARGET: ${{ vars.TARGET_LIGHTNING_VM_TARGET }}
          LIGHTNING_VM_STATUS_FILE: target-runtime-status.json
        run: |
          bash scripts/bootstrap_vm_keepalive.sh

      - name: Apply exact runtime secrets
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_PROJECT_ID: ${{ vars.TARGET_LIGHTNING_PROJECT_ID }}
          LIGHTNING_STUDIO_ID: ${{ vars.TARGET_LIGHTNING_STUDIO_ID }}
          LIGHTNING_VM_TARGET: ${{ vars.TARGET_LIGHTNING_VM_TARGET }}
          NEMOCLAW_SLACK_BOT_TOKEN: ${{ secrets.NEMOCLAW_SLACK_BOT_TOKEN }}
          NEMOCLAW_SLACK_APP_TOKEN: ${{ secrets.NEMOCLAW_SLACK_APP_TOKEN }}
          NEMOCLAW_SLACK_VERIFICATION_TOKEN: ${{ secrets.NEMOCLAW_SLACK_VERIFICATION_TOKEN }}
          NEMOCLAW_NVIDIA_API_KEY_LEADER: ${{ secrets.NEMOCLAW_NVIDIA_API_KEY_LEADER }}
          NEMOCLAW_NVIDIA_API_KEY_ASSISTANT1: ${{ secrets.NEMOCLAW_NVIDIA_API_KEY_ASSISTANT1 }}
          NEMOCLAW_NVIDIA_API_KEY_ASSISTANT2: ${{ secrets.NEMOCLAW_NVIDIA_API_KEY_ASSISTANT2 }}
          NEMOCLAW_SUPERMEMORY_API_KEY: ${{ secrets.NEMOCLAW_SUPERMEMORY_API_KEY }}
          NEMOCLAW_NEMO_TOKEN: ${{ secrets.NEMOCLAW_NEMO_TOKEN }}
        run: |
          bash scripts/apply_nemoclaw_runtime_remote.sh > nemoclaw-runtime-apply.json

      - name: Smoke test target runtime
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_PROJECT_ID: ${{ vars.TARGET_LIGHTNING_PROJECT_ID }}
          LIGHTNING_STUDIO_ID: ${{ vars.TARGET_LIGHTNING_STUDIO_ID }}
          LIGHTNING_VM_TARGET: ${{ vars.TARGET_LIGHTNING_VM_TARGET }}
        run: |
          bash scripts/test_nemoclaw_stack_remote.sh > nemoclaw-runtime-smoke.json
          python - <<'PY'
          import json
          data = json.load(open("nemoclaw-runtime-smoke.json"))
          print(f"hostname={data['hostname']}")
          print(f"leader_health_ok={data['leader']['health_ok']}")
          print(f"slack_bridge_ok={data['leader']['slack_bridge_ok']}")
          print(f"assistant1_helper_ok={data['assistant1']['browser_helper_ok']}")
          print(f"assistant2_helper_ok={data['assistant2']['browser_helper_ok']}")
          print(f"lightpanda_helper_ok={data['lightpanda']['helper_ok']}")
          PY

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nemoclaw-runtime-artifacts
          path: |
            target-runtime-status.json
            nemoclaw-runtime-apply.json
            nemoclaw-runtime-smoke.json
          if-no-files-found: warn
