name: Remove Billing Monitor

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH key
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.LIGHTNING_VM_SSH_KEY }}' > ~/.ssh/lightning_vm_key
          chmod 600 ~/.ssh/lightning_vm_key
          ssh-keyscan -H ssh.lightning.ai >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Remove billing monitor from VM
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          source scripts/lib_vm_ssh.sh
          ssh_retry "
            sudo systemctl disable --now billing-monitor.timer billing-monitor.service billing-board.service || true
            sudo rm -f /etc/systemd/system/billing-monitor.service /etc/systemd/system/billing-monitor.timer /etc/systemd/system/billing-board.service
            sudo rm -f /opt/nemoclaw-vm-automation/billing_monitor.py
            sudo rm -rf /opt/nemoclaw-vm-automation/vendor
            sudo rm -rf /var/lib/nemoclaw-billing
            sudo rm -rf /etc/nemoclaw-billing-monitor
            sudo rm -f /etc/nemoclaw-billing-monitor.env
            sudo systemctl daemon-reload
            sudo systemctl reset-failed billing-monitor.service billing-board.service || true
            ! systemctl is-active billing-monitor.timer
            ! systemctl is-active billing-board.service
          "
