name: VM Keepalive

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: handoff-vm-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Lightning API client
        run: |
          python -m pip install --upgrade pip
          pip install lightning-app PyYAML

      - name: Wake or heal the Lightning Studio
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          python scripts/lightning_vm_heal.py --restart-if-needed --out vm-keepalive-status.json
          python - <<'PY'
          import json
          data = json.load(open("vm-keepalive-status.json"))
          print(f"studio_id={data['studio_id']} action={data['action']} phase={data['instance_phase']}")
          PY

      - name: Configure SSH key
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.LIGHTNING_VM_SSH_KEY }}' > ~/.ssh/lightning_vm_key
          chmod 600 ~/.ssh/lightning_vm_key
          ssh-keyscan -H ssh.lightning.ai >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Refresh VM service and capture remote snapshot
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          bash scripts/bootstrap_vm_keepalive.sh
          bash scripts/fetch_vm_snapshot.sh > vm-keepalive-snapshot.json
          python - <<'PY'
          import json
          data = json.load(open("vm-keepalive-snapshot.json"))
          print(f"keepalive_active={data['keepalive_service']['active']} health_ok={data['nemoclaw_health'].get('ok')} needs_recovery={data['nemoclaw_health'].get('needs_recovery')}")
          PY

      - name: Ensure VM Supervisor is running
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          active_count="$(gh run list -R "$GITHUB_REPOSITORY" --workflow "VM Supervisor" --status in_progress --json databaseId --jq 'length')"
          echo "vm_supervisor_active_runs=$active_count"
          if [ "${active_count:-0}" -eq 0 ]; then
            gh workflow run vm-supervisor.yml -R "$GITHUB_REPOSITORY" -f trigger_source=keepalive-backstop
            echo "Dispatched VM Supervisor because no active run was found."
          fi

      - name: Capture keepalive snapshot
        if: failure()
        run: |
          if [ -f vm-keepalive-status.json ]; then
            cp vm-keepalive-status.json vm-keepalive-snapshot.json
          else
            printf '{"ok": false, "error": "vm-keepalive-status.json missing"}\n' > vm-keepalive-snapshot.json
          fi
          python - <<'PY'
          import json
          data = json.load(open("vm-keepalive-snapshot.json"))
          print(json.dumps(data, indent=2))
          PY

      - name: Upload keepalive snapshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vm-keepalive-snapshot
          path: vm-keepalive-snapshot.json
          if-no-files-found: warn
