name: VM Snapshot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: handoff-vm-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 235
    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.LIGHTNING_VM_SSH_KEY }}' > ~/.ssh/lightning_vm_key
          chmod 600 ~/.ssh/lightning_vm_key
          ssh-keyscan -H ssh.lightning.ai >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Install or refresh VM keepalive service
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          bash scripts/bootstrap_vm_keepalive.sh

      - name: Hold VM activity for the next 4-hour window
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
          LIGHTNING_KEEPALIVE_RUN_MINUTES: "228"
          LIGHTNING_KEEPALIVE_PULSE_SECONDS: "240"
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          end_epoch=$(( $(date +%s) + LIGHTNING_KEEPALIVE_RUN_MINUTES * 60 ))
          pulse=1
          while [ "$(date +%s)" -lt "$end_epoch" ]; do
            echo "pulse=$pulse at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            bash scripts/pulse_vm_keepalive.sh > vm-snapshot.json
            cat vm-snapshot.json
            pulse=$((pulse + 1))
            if [ "$(date +%s)" -lt "$end_epoch" ]; then
              sleep "$LIGHTNING_KEEPALIVE_PULSE_SECONDS"
            fi
          done

      - name: Capture final VM snapshot
        if: always()
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          bash scripts/fetch_vm_snapshot.sh > vm-snapshot.json
          cat vm-snapshot.json

      - name: Upload VM snapshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vm-snapshot
          path: vm-snapshot.json
          if-no-files-found: warn
