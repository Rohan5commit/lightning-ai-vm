name: VM Snapshot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: handoff-vm-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Lightning API client
        run: |
          python -m pip install --upgrade pip
          pip install lightning-app PyYAML

      - name: Wake or heal the Lightning Studio
        env:
          LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          python scripts/lightning_vm_heal.py --restart-if-needed --out vm-snapshot-status.json
          python - <<'PY'
          import json
          data = json.load(open("vm-snapshot-status.json"))
          print(f"studio_id={data['studio_id']} action={data['action']} phase={data['instance_phase']}")
          PY

      - name: Configure SSH key
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.LIGHTNING_VM_SSH_KEY }}' > ~/.ssh/lightning_vm_key
          chmod 600 ~/.ssh/lightning_vm_key
          ssh-keyscan -H ssh.lightning.ai >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Capture remote VM snapshot
        env:
          LIGHTNING_VM_TARGET: ${{ vars.LIGHTNING_VM_TARGET }}
        run: |
          export LIGHTNING_VM_SSH_KEY_FILE="$HOME/.ssh/lightning_vm_key"
          bash scripts/bootstrap_vm_keepalive.sh
          bash scripts/fetch_vm_snapshot.sh > vm-snapshot.json
          python - <<'PY'
          import json
          data = json.load(open("vm-snapshot.json"))
          print(f"keepalive_active={data['keepalive_service']['active']} health_ok={data['nemoclaw_health'].get('ok')} needs_recovery={data['nemoclaw_health'].get('needs_recovery')}")
          PY

      - name: Capture API status only
        if: failure()
        run: |
          cp vm-snapshot-status.json vm-snapshot.json
          python - <<'PY'
          import json
          data = json.load(open("vm-snapshot.json"))
          print(json.dumps(data, indent=2))
          PY

      - name: Upload VM snapshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vm-snapshot
          path: vm-snapshot.json
          if-no-files-found: warn
